<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-Up</title>
    <link rel="stylesheet" href="style3.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <form id="registerForm">
            <h1>Sign-up</h1>
            
            <div class="input-box">
                <input type="text" id="regUsername" placeholder="username" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input type="email" id="regEmail" placeholder="email" required>
                <i class='bx bxs-envelope'></i>
            </div>
            
            <div class="input-box">
                <input type="password" id="regPassword" placeholder="password" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <button type="submit" class="btn">Sign-up</button>

            <div class="register-link"> 
                <p> Already have an account? <a href="index2.html">Login</a></p>
            </div>
        </form>
    </div>

    <script>
        const API_BASE_URL = 'https://licafe.onrender.com'; 

        document.getElementById('registerForm').addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ 
                        username, 
                        email, 
                        password,
                        confirmPassword: password 
                    })
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok) {
                    alert("Account created successfully!");
                    window.location.href = 'index2.html';
                } else {
        
                    const errorMsg = data && data.error ? data.error : "Registration failed. Check your server logs.";
                    alert("Error: " + errorMsg);
                }
            } catch (error) {
                console.error("Network error:", error);
                alert("Could not reach the authentication server. Please try again in a few moments.");
            }
        });
    </script>
</body>
</html>
