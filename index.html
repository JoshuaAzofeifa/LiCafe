<body>
    <div class="main"> 
        <div class="navbar">

        </div>
        
        <div class="menu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index2.html">Login</a></li>

        <audio autoplay loop muted controls style="position: absolute; top: 15px; left: 150px; opacity: 0.5; z-index: 10;">
            <source src="Music.mp3" type="audio/mpeg">
        </audio>
    </div> 

    <script>
        const API_BASE_URL = 'https://licafe.onrender.com';

        async function checkServerHealth() {
            try {
                const response = await fetch(`${API_BASE_URL}/api/health`);
                if (!response.ok) {
                    console.warn("Backend server responded with an error status.");
                }
            } catch (error) {
                console.error("Could not establish a connection to the backend engine:", error);
            }
        }

        window.addEventListener('DOMContentLoaded', checkServerHealth);
    </script>
</body>
