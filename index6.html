
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse the Shelf</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://pro.fontawesome.com/releases/v5.10.0/css/all.css">
</head>
<body>

  <div class="menu" style="margin: 20px;">
    <ul>
      <li><a href="index.html" style="color: #fff; text-decoration: none; font-size: 18px; margin-right: 15px;">Home</a></li>
      <li><a href="index5.html" style="color: #fff; text-decoration: none; font-size: 18px;">Publish</a></li>
    </ul>
  </div> 

  <main class="scroll-container" id="literatureGrid">
    <p class="loading">Loading the shelf...</p>
  </main>

  <script>
    const API_BASE_URL = 'https://licafe.onrender.com';

    async function loadShelf() {
        const grid = document.getElementById('literatureGrid');
        try {
            const response = await fetch(`${API_BASE_URL}/api/literature`);
            if (!response.ok) {
                throw new Error("Failed to pull feed data");
            }
            
            const items = await response.json();
            grid.innerHTML = ''; 

            if (items.length === 0) {
                grid.innerHTML = '<p class="loading">The shelf is currently empty.</p>';
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'literature-card';
                card.style = 'background: rgba(255,255,255,0.1); padding: 20px; margin: 15px 0; border-radius: 8px; color: #fff;';
                card.innerHTML = `
                    <h2>${item.title}</h2>
                    <h3>By: ${item.author} | Genre: ${item.genre}</h3>
                    <p>${item.summary}</p>
                    <div class="votes" style="margin-top: 10px;">
                        <button onclick="castVote(${item.id}, 'like')" style="background: none; border: none; color: #00ff00; cursor: pointer; margin-right: 15px;">
                            <i class="fas fa-thumbs-up"></i> <span id="likes-${item.id}">${item.likes || 0}</span>
                        </button>
                        <button onclick="castVote(${item.id}, 'dislike')" style="background: none; border: none; color: #ff0000; cursor: pointer;">
                            <i class="fas fa-thumbs-down"></i> <span id="dislikes-${item.id}">${item.dislikes || 0}</span>
                        </button>
                    </div>
                `;
                grid.appendChild(card);
            });

        } catch (error) {
            console.error("Fetch Error:", error);
            grid.innerHTML = '<p class="loading" style="color: #ff4d4d;">Could not load items from the shelf right now.</p>';
        }
    }

    async function castVote(literatureId, voteType) {
        try {
            const response = await fetch(`${API_BASE_URL}/api/vote`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ literature_id: literatureId, vote_type: voteType })
            });

            const data = await response.json();
            if (response.ok) {
                document.getElementById(`likes-${literatureId}`).innerText = data.likes;
                document.getElementById(`dislikes-${literatureId}`).innerText = data.dislikes;
            } else {
                alert(data.error || "Must be logged in to vote!");
            }
        } catch (error) {
            console.error("Voting system error:", error);
        }
    }

    window.addEventListener('DOMContentLoaded', loadShelf);
  </script>
</body>
</html>
