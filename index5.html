<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publish</title>
    <link rel="stylesheet" href="style5.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>
    <div class="wrapper">
        <form id="registerForm">
            <h1>Add to the shelf</h1>
            
            <div class="input-box">
                <input type="text" id="regTitle" placeholder=" Title of your work" required>
                <i class="bx bx-book"></i>
            </div>

            <div class="input-box">
                <select id="litGenre" required>
                    <option value="" disabled selected hidden>Select Genre</option>
                    <option value="Poetry">Poetry</option>
                    <option value="Drama">Drama</option>
                    <option value="Novel">Novel</option>
                    <option value="Short story">Short story</option>
                    <option value="Essay">Essay</option>
                    <option value="Fiction">Fiction</option>
                    <option value="Theatre">Theatre</option>
                </select>
                <i class='bx bxs-tag-alt left-icon'></i>
                <span class="input-box">
                    <i class='bx bx-chevron-down right-icon'></i>
                </span>
            </div>

            <div class="input-box">
                <input type="file" id="regFile" accept=".pdf" required>
                <i class="bx bxs-file-pdf"></i>
            </div>
            
            <div class="input-box summary-box">
                <textarea id="regSummary" placeholder="Please create a summary" required></textarea>
                <i class='bx bx-edit-alt'></i>
            </div>

            <button type="submit" class="btn">Publish</button>
        </form>
    </div>

    <div class="menu">
        <ul>
            <li><a href="index.html">Home</a></li>
        </ul>
    </div> 

    <script>
        const API_BASE_URL = 'https://licafe.onrender.com';

        document.getElementById('registerForm').addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const title = document.getElementById('regTitle').value;
            const genre = document.getElementById('litGenre').value;
            const summary = document.getElementById('regSummary').value;

            try {
                const response = await fetch(`${API_BASE_URL}/api/publish`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    credentials: 'include',
                    body: JSON.stringify({ title, genre, summary })
                });

                let data;
                try {
                    data = await response.json();
                } catch (e) {
                    data = null;
                }

                if (response.ok) {
                    alert(`"${title}" has been successfully added to your shelf!`);
                    this.reset(); 
                } else {
                    const errorMsg = data && data.error ? data.error : 'Unknown error occurred on the server.';
                    alert(`Failed to publish: ${errorMsg}`);
                }
            } catch (error) {
                console.error("Network Error:", error);
                alert("Could not connect to the database server. Make sure your backend is running!");
            }
        });
    </script>
</body>
</html>
</html>
